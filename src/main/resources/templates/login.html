<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>SpendWise - Login</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        :root {

            --bg0: #020617;
            --bg1: #020617;


            --c1: 30, 64, 175;    /* deep indigo/blue accent */
            --c2: 22, 101, 52;    /* dark emerald */
            --c3: 34, 197, 94;    /* softer green accent */
            --ink: #e5e7eb;
            --muted: rgba(226, 232, 240, 0.80);
        }

        html, body { height: 100%; }
        body {
            margin: 0;
            background: var(--bg1);
            color: var(--ink);
            overflow: hidden;
            font-family: Inter, system-ui, sans-serif;
        }

        /* Fullscreen animated background (same style as loading, different wrapper name) */
        .login-wrapper {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 0;
            background: var(--bg1);
        }

        .bg-noise {
            position: absolute;
            inset: -40px;
            opacity: 0.08;
            filter: contrast(120%) brightness(110%);
            background-image:
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="160" height="160" filter="url(%23n)" opacity="0.55"/></svg>');
            background-size: 160px 160px;
            pointer-events: none;
            z-index: 0;
        }

        .dotwave {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.95;
            z-index: 0;
        }

        .dotwave canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
            z-index: 2; /* above background canvas/noise */
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            border-radius: 15px;
            padding: 48px 40px;
            border: 1px solid rgba(15, 23, 42, 0.55);
            background: rgba(5, 44, 51, 0.38);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #043916 0%, #05451e 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: rgba(4, 124, 65, 0.87);

            box-shadow: 0 8px 16px rgba(34, 197, 94, 0);
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #e5e7eb;
            margin: 0 0 8px 0;
        }

        .login-subtitle {
            font-size: 14px;
            color: rgba(148, 163, 184, 0.95);
            margin: 0;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 8px;
        }

        /* Override any global form-group styles from main.css */
        .login-card .form-group input[type="text"],
        .login-card .form-group input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.75);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            /* Same polygon header-style background as button, but softer */
            background-image:
                linear-gradient(to right, rgba(15,23,42,0.96), rgba(15,23,42,0.90)),
                url('/images/header.jpeg');
            background-size: 140% 140%, cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            color: #e5e7eb !important;
            cursor: text;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .login-card .form-group input[type="text"]:focus,
        .login-card .form-group input[type="password"]:focus {
            outline: none;
            border-color: #22c55e !important;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
            background-image:
                linear-gradient(to right, rgba(15,23,42,0.96), rgba(15,23,42,0.90)),
                url('/images/header.jpeg');
        }

        .login-card .form-group input[type="text"]::placeholder,
        .login-card .form-group input[type="password"]::placeholder {
            color: #9ca3af;
        }

        /* Legacy support for .form-input class */
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.75);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            background-image:
                linear-gradient(to right, rgba(15,23,42,0.96), rgba(15,23,42,0.90)),
                url('/images/header.jpeg');
            background-size: 140% 140%, cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            color: #e5e7eb !important;
        }

        .form-input:focus {
            outline: none;
            border-color: #22c55e !important;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
            background-image:
                linear-gradient(to right, rgba(15,23,42,0.96), rgba(15,23,42,0.90)),
                url('/images/header.jpeg');
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .btn-login {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.75);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-sizing: border-box;
            background-image:
                linear-gradient(to right, rgba(15,23,42,0.96), rgba(15,23,42,0.90)),
                url('/images/header.jpeg');
            background-size: 140% 140%, cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            color: #e5e7eb;
            cursor: pointer;
            box-shadow: 0 18px 40px rgba(0,0,0,0.55);
        }

        .btn-login:hover {
            border-color: #22c55e !important;
            box-shadow: 0 22px 52px rgba(0,0,0,0.70);
            filter: brightness(1.05);
        }

        .btn-login:active {
            box-shadow: 0 16px 32px rgba(0,0,0,0.45);
            filter: brightness(0.97);
        }

        .login-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: rgba(148, 163, 184, 0.9);
        }

        .demo-credentials {
            margin-top: 24px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .demo-title {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .demo-label {
            color: #6b7280;
        }

        .demo-value {
            font-family: 'Courier New', monospace;
            color: #1f2937;
            font-weight: 500;
        }
        .demo-value {
            font-family: 'Courier New', monospace;
            color: #1f2937;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="dotwave" aria-hidden="true">
        <canvas id="dotWaveCanvas"></canvas>
    </div>
    <div class="bg-noise" aria-hidden="true"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle">SW</div>
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to continue to SpendWise</p>
            </div>

            <!-- Error Message -->
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password. Please try again.
            </div>

            <!-- Logout Success Message -->
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out successfully.
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input"
                            placeholder="Enter your username"
                            required
                            autofocus
                    />
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                    />
                </div>

                <button type="submit" class="btn-login">
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                © 2026 SpendWise. All rights reserved.
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- DOTTED WAVE BACKDROP ---
        var waveCanvas = document.getElementById('dotWaveCanvas');
        if (!waveCanvas) return;

        var mediaReduce = globalThis.matchMedia && globalThis.matchMedia('(prefers-reduced-motion: reduce)');
        if (mediaReduce && mediaReduce.matches) return;

        var wctx = waveCanvas.getContext('2d', { alpha: true });
        var wdpr = Math.max(1, Math.min(2, globalThis.devicePixelRatio || 1));

        var cols = 0;
        var rows = 0;
        var spacing = 18; // px between dots
        var lastTs = 0;
        var t = 0;

        function wresize() {
            var rect = waveCanvas.getBoundingClientRect();
            waveCanvas.width = Math.floor(rect.width * wdpr);
            waveCanvas.height = Math.floor(rect.height * wdpr);
            wctx.setTransform(wdpr, 0, 0, wdpr, 0, 0);

            // adapt spacing slightly to screen size
            var base = Math.min(rect.width, rect.height);
            spacing = Math.max(14, Math.min(22, Math.round(base / 52)));

            cols = Math.ceil(rect.width / spacing) + 10;
            rows = Math.ceil(rect.height / spacing) + 10;
        }

        function drawWave(dt) {
            var rectW = waveCanvas.clientWidth;
            var rectH = waveCanvas.clientHeight;
            wctx.clearRect(0, 0, rectW, rectH);

            // world rotation-ish perspective: scale Y a bit (shifted down)
            var centerX = rectW * 0.52;
            var centerY = rectH * 0.75;

            // traveling waves (slowed down a bit more)
            var speed = 0.00018;
            t += dt * speed;

            var amp = Math.max(15, Math.min(35, rectH * 0.045));

            // dot styling
            var baseR = Math.max(1.0, Math.min(1.9, spacing * 0.085));

            for (var iy = 0; iy < rows; iy++) {
                var y0 = (iy - 4) * spacing + (rectH * 0.2);

                // perspective: far rows are tighter and slightly lifted
                var py = (y0 - centerY) / rectH;
                var persp = 1 + py * 0.9;

                for (var ix = 0; ix < cols; ix++) {
                    var x0 = (ix - 4) * spacing;

                    // wave field (two sine waves + diagonal) - slowed down frequencies
                    var w1 = Math.sin((x0 * 0.018) + (y0 * 0.012) + t * 2.0);
                    var w2 = Math.cos((x0 * 0.010) - (y0 * 0.020) + t * 1.5);
                    var w3 = Math.sin((x0 + y0) * 0.012 - t * 1.8);

                    var z = (w1 * 0.55 + w2 * 0.35 + w3 * 0.45); // -1..1-ish
                    var dy = z * amp * (0.55 + (iy / rows) * 0.65);

                    // slight drift to make the net feel alive (slowed down)
                    var driftX = Math.sin(t * 0.4 + iy * 0.12) * 6;

                    // perspective transform around center
                    var xx = centerX + ((x0 + driftX) - centerX) * persp;
                    var yy = centerY + ((y0 + dy) - centerY) * persp;

                    // fade near edges + depth fade (reduced edge fade for full coverage)
                    var edgeFade = Math.min(
                        1,
                        Math.min(xx / (rectW * 0.05), (rectW - xx) / (rectW * 0.05), yy / (rectH * 0.05), (rectH - yy) / (rectH * 0.05))
                    );

                    // depth-ish: far back (top) gets dimmer and smaller
                    var depth = 1 - Math.max(0, (centerY - yy) / rectH);
                    var a = (0.18 + (z + 1) * 0.18) * edgeFade * (0.35 + depth * 0.65);
                    if (a <= 0.01) continue;

                    var r = baseR * (0.9 + depth * 0.65) * (0.85 + (z + 1) * 0.10);
                    wctx.beginPath();
                    wctx.fillStyle = 'rgba(56, 189, 248, ' + (a * 0.45).toFixed(3) + ')';
                    wctx.arc(xx, yy, r, 0, Math.PI * 2);
                    wctx.fill();
                }
            }
        }

        function wframe(ts) {
            if (!lastTs) lastTs = ts;
            var dt = Math.min(42, ts - lastTs);
            lastTs = ts;

            drawWave(dt);
            globalThis.requestAnimationFrame(wframe);
        }

        globalThis.addEventListener('resize', wresize);
        wresize();
        globalThis.requestAnimationFrame(wframe);

    })();
</script>
</body>
</html>
