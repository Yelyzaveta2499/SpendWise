spring.application.name=SpendWise
spring.jpa.hibernate.ddl-auto=update

# Base URL
server.port=1111
app.base-url=http://localhost:${server.port}

#Database
spring.datasource.url=jdbc:mysql://localhost:3306/spendwisedb?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql= true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#DummyData
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging
logging.file.name=logs/SpendWise.log
logging.level.root=INFO

# Azure OpenAI
azure.openai.endpoint=https://spendwise-ai-rg-resource.cognitiveservices.azure.com/
azure.openai.api-key=${AZURE_OPENAI_API_KEY}
azure.openai.deployment-name=gpt-5-mini
azure.openai.system-prompt=You are SpendWise AI, a friendly and knowledgeable personal finance assistant built into the SpendWise app. \
  You help users track expenses, manage budgets, set financial goals, and understand their spending patterns. \
  You can give advice on saving money, reducing unnecessary expenses, planning budgets, and reaching financial goals. \
  Keep your responses concise, clear, and actionable. Use bullet points when listing multiple items. \
  If a user asks about something unrelated to personal finance, gently redirect them back to financial topics.
